<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-xl shadow-md border border-gray-100">
    <div>
      <h2 class="text-center text-3xl font-extrabold text-gray-900">Create an account</h2>
    </div>
    
    <div *ngIf="errorMessage" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-100">
      {{ errorMessage }}
    </div>

    <form class="mt-8 space-y-6" (ngSubmit)="onRegister()">
      <div class="rounded-md space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input name="username" type="text" required [(ngModel)]="user.username"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input name="password" type="password" required [(ngModel)]="user.password"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="loading"
          class="w-full py-2 px-4 border border-transparent rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-blue-300">
          {{ loading ? 'Creating account...' : 'Register' }}
        </button>
      </div>
    </form>

    <div class="text-center mt-4">
      <a routerLink="/login" class="text-sm font-medium text-blue-600 hover:text-blue-500">
        Already have an account? Sign in
      </a>
    </div>
  </div>
</div>
